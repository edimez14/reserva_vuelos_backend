# fly.toml — Configuración de despliegue en Fly.io
# Generado manualmente para el proyecto reserva-vuelos backend (Django + Gunicorn)
# Documentación: https://fly.io/docs/reference/configuration/

app = "reserva-vuelos-backend"
primary_region = "mia"

# ---------- Build ----------
# Fly usa el Dockerfile del proyecto directamente.
[build]

# ---------- Variables de entorno (no secretas) ----------
# Los secretos reales (SECRET_KEY, DATABASE_URL, etc.) se configuran con:
#   fly secrets set NOMBRE=valor
[env]
DJANGO_SETTINGS_MODULE = "backend.settings"
PORT = "8080"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

# ---------- Comando de release ----------
# Se ejecuta antes de que el nuevo servidor arranque.
# Aplica migraciones pendientes de forma segura en producción.
[deploy]
release_command = "python manage.py migrate --no-input"

# ---------- Servicio HTTP ----------
[[services]]
internal_port = 8080
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80
force_https = true

[[services.ports]]
handlers = ["tls", "http"]
port = 443

# Health check: Fly.io verifica que la app responda antes de enrutar tráfico.
[[services.http_checks]]
interval = 10000      # cada 10 s
timeout = 5000        # espera máx 5 s
grace_period = "30s"  # margen al arrancar
method = "GET"
path = "/api/health/"
protocol = "http"

# ---------- Máquina virtual ----------
[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
