# fly.toml — Configuración de despliegue en Fly.io
# Generado manualmente para el proyecto reserva-vuelos backend (Django + Gunicorn)
# Documentación: https://fly.io/docs/reference/configuration/

app = "reserva-vuelos-backend"
primary_region = "mia"

# ---------- Build ----------
# Fly usa el Dockerfile del proyecto directamente.
[build]

# ---------- Variables de la aplicación ----------
# TODAS las variables de la aplicación se inyectan en Fly.io mediante:
#   fly secrets set SECRET_KEY=valor
#   fly secrets set DATABASE_URL=valor
#   fly secrets set AVIATIONSTACK_API_KEY=valor
#   fly secrets set CORS_ALLOWED_ORIGINS=valor
#   fly secrets set EMAIL_HOST_USER=valor
#   fly secrets set EMAIL_HOST_PASSWORD=valor
#   fly secrets set DEFAULT_FROM_EMAIL=valor
#   fly secrets set DEBUG=False
#   fly secrets set ALLOWED_HOSTS=<app>.fly.dev
#   fly secrets set DJANGO_SETTINGS_MODULE=backend.settings
#
# Fly.io inyecta PORT (8080) automáticamente en tiempo de ejecución.
# No se declara [env] aquí para evitar exponer configuración en el repositorio.

# ---------- Comando de release ----------
# Se ejecuta antes de que el nuevo servidor arranque.
# Aplica migraciones pendientes de forma segura en producción.
[deploy]
release_command = "python manage.py migrate --no-input"

# ---------- Servicio HTTP ----------
[[services]]
internal_port = 8080
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80
force_https = true

[[services.ports]]
handlers = ["tls", "http"]
port = 443

# Health check: Fly.io verifica que la app responda antes de enrutar tráfico.
[[services.http_checks]]
interval = 10000      # cada 10 s
timeout = 5000        # espera máx 5 s
grace_period = "30s"  # margen al arrancar
method = "GET"
path = "/api/health/"
protocol = "http"

# ---------- Máquina virtual ----------
[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
